<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChronoJoust - Test Page</title>
    <style>
        body { 
            font-family: monospace; 
            background: #0a0a1a; 
            color: #00ffff;
            padding: 2rem;
        }
        .test { 
            border: 2px solid #00ffff;
            padding: 1rem;
            margin: 1rem 0;
        }
        .pass { color: #00ff00; }
        .fail { color: #ff0000; }
    </style>
</head>
<body>
    <h1>ChronoJoust - Setup Test</h1>
    <p>This page tests if your GitHub Pages setup is working correctly.</p>
    
    <div class="test">
        <h2>Test 1: Files Loading</h2>
        <p id="test1">Testing...</p>
    </div>
    
    <div class="test">
        <h2>Test 2: CDN Libraries</h2>
        <p id="test2">Testing...</p>
    </div>
    
    <div class="test">
        <h2>Test 3: ChronoJoust.jsx File</h2>
        <p id="test3">Testing...</p>
    </div>
    
    <div class="test">
        <h2>Test 4: Babel Transformation</h2>
        <p id="test4">Testing...</p>
    </div>
    
    <hr>
    <p><a href="index.html" style="color: #00ffff;">← Back to Game</a></p>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        // Test 1: Basic page load
        document.getElementById('test1').innerHTML = '<span class="pass">✓ PASS</span> - This page loaded successfully';
        
        // Test 2: CDN Libraries
        if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined' && typeof Babel !== 'undefined') {
            document.getElementById('test2').innerHTML = '<span class="pass">✓ PASS</span> - React, ReactDOM, and Babel loaded';
        } else {
            document.getElementById('test2').innerHTML = '<span class="fail">✗ FAIL</span> - Missing libraries. Check internet connection.';
        }
        
        // Test 3: Check if ChronoJoust.jsx exists
        fetch('ChronoJoust.jsx')
            .then(response => {
                if (response.ok) {
                    return response.text();
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            })
            .then(text => {
                if (text.includes('ChronoJoust')) {
                    document.getElementById('test3').innerHTML = 
                        '<span class="pass">✓ PASS</span> - ChronoJoust.jsx found (' + 
                        Math.round(text.length/1024) + 'KB)';
                    
                    // Test 4: Try to transform a simple component
                    try {
                        const simpleJSX = 'const Test = () => <div>Hello</div>;';
                        const result = Babel.transform(simpleJSX, { presets: ['react'] });
                        document.getElementById('test4').innerHTML = '<span class="pass">✓ PASS</span> - Babel transformation working';
                        
                        document.body.innerHTML += '<hr><h2 style="color: #00ff00;">All Tests Passed! ✓</h2><p>Your setup is correct. The game should work.</p><p>If the game still won\'t load, check the browser console (F12) for specific errors.</p>';
                    } catch (error) {
                        document.getElementById('test4').innerHTML = '<span class="fail">✗ FAIL</span> - Babel error: ' + error.message;
                    }
                } else {
                    throw new Error('File exists but doesn\'t contain expected content');
                }
            })
            .catch(error => {
                document.getElementById('test3').innerHTML = 
                    '<span class="fail">✗ FAIL</span> - Cannot load ChronoJoust.jsx: ' + error.message + 
                    '<br><br><strong>Fix:</strong> Make sure ChronoJoust.jsx is uploaded to GitHub and in the same folder as index.html';
                document.getElementById('test4').innerHTML = '<span class="fail">✗ SKIP</span> - Cannot test without ChronoJoust.jsx';
            });
    </script>
</body>
</html>
