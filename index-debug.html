<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoJoust - Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0a0a1a; }
        #status { color: #00ffff; padding: 20px; font-family: monospace; }
        .error { color: #ff0000; }
        .success { color: #00ff00; }
    </style>
</head>
<body>
    <div id="status">
        <h1>ChronoJoust - Loading Diagnostic</h1>
        <div id="log"></div>
    </div>
    <div id="root"></div>
    
    <script>
        const log = (msg, isError = false) => {
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'success';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('log').appendChild(div);
            console.log(msg);
        };

        log('Step 1: Checking if React loaded...');
        if (typeof React !== 'undefined') {
            log('✓ React loaded successfully');
        } else {
            log('✗ React failed to load!', true);
        }

        log('Step 2: Checking if ReactDOM loaded...');
        if (typeof ReactDOM !== 'undefined') {
            log('✓ ReactDOM loaded successfully');
        } else {
            log('✗ ReactDOM failed to load!', true);
        }

        log('Step 3: Checking if Babel loaded...');
        if (typeof Babel !== 'undefined') {
            log('✓ Babel loaded successfully');
        } else {
            log('✗ Babel failed to load!', true);
        }

        log('Step 4: Attempting to fetch ChronoJoust.jsx...');
        fetch('ChronoJoust.jsx')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                log('✓ ChronoJoust.jsx found');
                return response.text();
            })
            .then(code => {
                log(`✓ File loaded (${code.length} characters)`);
                
                // Check for problematic imports
                if (code.includes('import React') || code.includes('export default')) {
                    log('✗ WARNING: File still contains import/export statements!', true);
                    log('  You need to re-upload the UPDATED ChronoJoust.jsx file', true);
                } else {
                    log('✓ No import/export statements found');
                }
                
                log('Step 5: Transforming JSX with Babel...');
                try {
                    const transformed = Babel.transform(code, { presets: ['react'] });
                    log('✓ JSX transformed successfully');
                    
                    log('Step 6: Executing transformed code...');
                    eval(transformed.code);
                    log('✓ Code executed');
                    
                    log('Step 7: Checking if ChronoJoust component exists...');
                    if (typeof ChronoJoust !== 'undefined') {
                        log('✓ ChronoJoust component found');
                        
                        log('Step 8: Rendering game...');
                        const rootElement = document.getElementById('root');
                        const root = ReactDOM.createRoot(rootElement);
                        root.render(React.createElement(ChronoJoust));
                        log('✓ GAME RENDERED SUCCESSFULLY!');
                        
                        // Hide diagnostic after 2 seconds
                        setTimeout(() => {
                            document.getElementById('status').style.display = 'none';
                        }, 2000);
                    } else {
                        log('✗ ChronoJoust component not found after execution!', true);
                    }
                } catch (err) {
                    log(`✗ Transform/Execute error: ${err.message}`, true);
                    console.error('Full error:', err);
                }
            })
            .catch(error => {
                log(`✗ Fetch error: ${error.message}`, true);
                log('  Possible causes:', true);
                log('  - ChronoJoust.jsx not in same folder as index.html', true);
                log('  - Filename spelling/capitalization mismatch', true);
                log('  - File not uploaded to GitHub', true);
            });
    </script>
</body>
</html>
