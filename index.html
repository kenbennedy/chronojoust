<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoJoust - A Cyberpunk Platformer</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="ChronoJoust_cover_art.png">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a1a;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <!-- React App Root -->
    <div id="root"></div>
    
    <!-- Inline game code to avoid loading issues -->
    <script type="text/babel" src="ChronoJoust.jsx"></script>
    
    <script type="text/babel">
        // Render the game
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<ChronoJoust />);
    </script>
</body>
</html>
