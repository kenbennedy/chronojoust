<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoJoust - A Cyberpunk Platformer</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="ChronoJoust_cover_art.png">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a1a;
            overflow-x: hidden;
        }
        
        /* Loading screen */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        #loading h1 {
            color: #00ffff;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px #00ffff;
            margin-bottom: 1rem;
        }
        
        #loading p {
            color: #8800ff;
            font-size: 1.2rem;
        }
        
        .spinner {
            border: 4px solid rgba(0, 255, 255, 0.1);
            border-top: 4px solid #00ffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-top: 2rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <h1>CHRONO-JOUST</h1>
        <p>Loading the void...</p>
        <div class="spinner"></div>
    </div>
    
    <!-- React App Root -->
    <div id="root"></div>
    
    <!-- Load and render the game -->
    <script type="text/babel" src="ChronoJoust.jsx"></script>
    <script type="text/babel">
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            // Get the root element
            const rootElement = document.getElementById('root');
            
            // Create root and render the game
            const root = ReactDOM.createRoot(rootElement);
            root.render(<ChronoJoust />);
            
            // Hide loading screen after a short delay
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);
        });
    </script>
</body>
</html>
