<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoJoust - A Cyberpunk Platformer</title>
    <link rel="icon" type="image/png" href="ChronoJoust_cover_art.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #0a0a1a; 
            overflow-x: hidden; 
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            font-family: monospace;
        }
        .spinner {
            border: 4px solid rgba(0, 255, 255, 0.1);
            border-top: 4px solid #00ffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-top: 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #ff0000;
            padding: 2rem;
            max-width: 600px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h1 style="font-size: 2.5rem; text-shadow: 0 0 20px #00ffff;">CHRONO-JOUST</h1>
        <p>Loading the void...</p>
        <div class="spinner"></div>
        <p id="status" style="margin-top: 1rem; font-size: 0.9rem; color: #8800ff;">Initializing...</p>
    </div>
    
    <div id="root"></div>
    
    <script>
        function updateStatus(msg) {
            const statusEl = document.getElementById('status');
            if (statusEl) statusEl.textContent = msg;
            console.log('Status:', msg);
        }
        
        window.onerror = function(msg, url, line, col, error) {
            console.error('Global error:', msg, error);
            document.getElementById('loading').innerHTML = 
                '<div class="error"><h2>Error Loading Game</h2><p>' + msg + '</p><p>Line: ' + line + '</p><p>Open console (F12) for details</p></div>';
            return false;
        };
    </script>
    
    <script type="text/babel">
        (async function() {
            try {
                updateStatus('Loading game file...');
                
                const response = await fetch('ChronoJoust.jsx');
                if (!response.ok) {
                    throw new Error('Failed to load ChronoJoust.jsx - HTTP ' + response.status + '. Make sure the file exists in the same folder.');
                }
                
                updateStatus('Reading game code...');
                const jsxCode = await response.text();
                
                if (!jsxCode || jsxCode.length < 100) {
                    throw new Error('ChronoJoust.jsx appears to be empty or corrupted');
                }
                
                updateStatus('Compiling with Babel (' + Math.round(jsxCode.length/1024) + 'KB)...');
                console.log('JSX file loaded, size:', jsxCode.length, 'bytes');
                
                // Transform JSX to JavaScript
                const result = Babel.transform(jsxCode, { 
                    presets: ['react'],
                    filename: 'ChronoJoust.jsx'
                });
                
                updateStatus('Executing game code...');
                
                // Execute the transformed code
                eval(result.code);
                
                // Wait a moment for evaluation to complete
                await new Promise(resolve => setTimeout(resolve, 100));
                
                updateStatus('Starting game...');
                
                // Check if ChronoJoust is defined
                if (typeof ChronoJoust === 'undefined') {
                    throw new Error('ChronoJoust component not found after execution. Check console for errors.');
                }
                
                console.log('ChronoJoust component loaded successfully');
                
                // Hide loading screen
                document.getElementById('loading').style.display = 'none';
                
                // Render the game
                const rootElement = document.getElementById('root');
                const root = ReactDOM.createRoot(rootElement);
                root.render(React.createElement(ChronoJoust));
                
                console.log('Game rendered successfully!');
                
            } catch (error) {
                console.error('Error during game loading:', error);
                console.error('Stack trace:', error.stack);
                document.getElementById('loading').innerHTML = 
                    '<div class="error">' +
                    '<h2>Failed to Load Game</h2>' +
                    '<p><strong>Error:</strong> ' + error.message + '</p>' +
                    '<p>Check the browser console (press F12) for detailed error information.</p>' +
                    '<p><strong>Common fixes:</strong></p>' +
                    '<ul style="text-align: left; display: inline-block;">' +
                    '<li>Make sure ChronoJoust.jsx is in the same folder</li>' +
                    '<li>Run from a web server (not file://)</li>' +
                    '<li>Try a different browser (Chrome recommended)</li>' +
                    '<li>Clear cache and reload (Ctrl+Shift+R)</li>' +
                    '</ul>' +
                    '</div>';
            }
        })();
    </script>
</body>
</html>
